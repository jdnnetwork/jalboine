name: jalboine
description: "고령층 스마트폰 런처"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  supabase_flutter: ^2.5.0
  audioplayers: ^6.0.0
  flutter_local_notifications: ^17.0.0
  permission_handler: ^11.0.0
  timezone: ^0.9.0
  url_launcher: ^6.2.0
  android_intent_plus: ^5.0.0
  shared_preferences: ^2.2.0
  crypto: ^3.0.0
  battery_plus: ^6.0.0
  connectivity_plus: ^6.0.0
  app_links: ^6.0.0
  flutter_ringtone_player: ^4.0.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/app_icon.png"
  remove_alpha_ios: true
  background_color_ios: "#FBF6EE"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
